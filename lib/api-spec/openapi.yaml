openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Чамайг сонсъё - Child Protection System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: surveys
    description: Survey management
  - name: responses
    description: Survey responses
  - name: cases
    description: Student cases
  - name: users
    description: User management
  - name: dashboard
    description: Dashboard summaries
  - name: notifications
    description: Notifications

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /surveys:
    get:
      operationId: getSurveys
      tags: [surveys]
      summary: List all surveys
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: gradeGroup
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a new survey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"

  /surveys/{id}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get survey by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
    patch:
      operationId: updateSurvey
      tags: [surveys]
      summary: Update survey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyUpdate"
      responses:
        "200":
          description: Updated survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"

  /survey-responses:
    get:
      operationId: getSurveyResponses
      tags: [responses]
      summary: List survey responses
      parameters:
        - name: studentId
          in: query
          schema:
            type: integer
        - name: riskLevel
          in: query
          schema:
            type: string
        - name: classroomId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurveyResponse"
    post:
      operationId: submitSurveyResponse
      tags: [responses]
      summary: Submit a survey response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyResponseInput"
      responses:
        "201":
          description: Created response with risk score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"

  /survey-responses/{id}:
    get:
      operationId: getSurveyResponse
      tags: [responses]
      summary: Get a survey response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResponse"

  /cases:
    get:
      operationId: getCases
      tags: [cases]
      summary: List student cases
      parameters:
        - name: assignedTo
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: riskLevel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseInput"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseUpdate"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}/notes:
    post:
      operationId: addCaseNote
      tags: [cases]
      summary: Add a note to a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List users
      parameters:
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /dashboard/teacher:
    get:
      operationId: getTeacherDashboard
      tags: [dashboard]
      summary: Get teacher dashboard summary
      parameters:
        - name: classroomId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Teacher dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherDashboard"

  /dashboard/psychologist:
    get:
      operationId: getPsychologistDashboard
      tags: [dashboard]
      summary: Get psychologist dashboard summary
      responses:
        "200":
          description: Psychologist dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PsychologistDashboard"

  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      summary: Get admin dashboard summary
      responses:
        "200":
          description: Admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /notifications/send:
    post:
      operationId: sendNotification
      tags: [notifications]
      summary: Send a mock email notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationResult"

  /classrooms:
    get:
      operationId: getClassrooms
      tags: [users]
      summary: List classrooms
      responses:
        "200":
          description: List of classrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classroom"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Survey:
      type: object
      required: [id, title, gradeGroup, surveyType, status, questions, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        gradeGroup:
          type: string
          description: "grades_1_3, grades_4_6, grades_7_9, grades_10_12"
        surveyType:
          type: string
          description: "daily_checkin, monthly, bullying, home_safety, behavior, help_readiness"
        status:
          type: string
          description: "draft, reviewed, approved, active, archived"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        createdAt:
          type: string

    SurveyInput:
      type: object
      required: [title, gradeGroup, surveyType, questions]
      properties:
        title:
          type: string
        description:
          type: string
        gradeGroup:
          type: string
        surveyType:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"

    SurveyUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"

    Question:
      type: object
      required: [id, text, type, options]
      properties:
        id:
          type: string
        text:
          type: string
        type:
          type: string
          description: "emoji_choice, scale, yes_no, multiple_choice, text"
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        riskWeight:
          type: ["number", "null"]

    QuestionOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string
        emoji:
          type: ["string", "null"]
        riskScore:
          type: ["number", "null"]

    SurveyResponse:
      type: object
      required: [id, surveyId, studentCode, answers, riskScore, riskLevel, createdAt]
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        studentCode:
          type: string
        studentName:
          type: ["string", "null"]
        classroomId:
          type: ["integer", "null"]
        grade:
          type: ["string", "null"]
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
        riskScore:
          type: number
        riskLevel:
          type: string
          description: "green, yellow, orange, red"
        flags:
          type: array
          items:
            type: string
        createdAt:
          type: string

    SurveyResponseInput:
      type: object
      required: [surveyId, studentCode, answers]
      properties:
        surveyId:
          type: integer
        studentCode:
          type: string
        studentName:
          type: string
        classroomId:
          type: integer
        grade:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"

    Answer:
      type: object
      required: [questionId, value]
      properties:
        questionId:
          type: string
        value:
          type: string

    Case:
      type: object
      required: [id, studentCode, riskLevel, status, createdAt, notes]
      properties:
        id:
          type: integer
        studentCode:
          type: string
        studentName:
          type: ["string", "null"]
        grade:
          type: ["string", "null"]
        classroomId:
          type: ["integer", "null"]
        surveyResponseId:
          type: ["integer", "null"]
        riskLevel:
          type: string
        status:
          type: string
          description: "open, in_progress, closed, referred"
        assignedTo:
          type: ["integer", "null"]
        notes:
          type: array
          items:
            $ref: "#/components/schemas/CaseNote"
        flags:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    CaseInput:
      type: object
      required: [studentCode, riskLevel]
      properties:
        studentCode:
          type: string
        studentName:
          type: string
        grade:
          type: string
        classroomId:
          type: integer
        surveyResponseId:
          type: integer
        riskLevel:
          type: string
        assignedTo:
          type: integer
        flags:
          type: array
          items:
            type: string

    CaseUpdate:
      type: object
      properties:
        status:
          type: string
        assignedTo:
          type: integer
        riskLevel:
          type: string

    CaseNote:
      type: object
      required: [id, caseId, content, action, createdAt]
      properties:
        id:
          type: integer
        caseId:
          type: integer
        content:
          type: string
        action:
          type: string
          description: "talked, contacted_parent, referred_social, referred_psychologist, confidential"
        authorId:
          type: ["integer", "null"]
        createdAt:
          type: string

    CaseNoteInput:
      type: object
      required: [content, action]
      properties:
        content:
          type: string
        action:
          type: string
        authorId:
          type: integer

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          description: "student, teacher, psychologist, social_worker, admin"
        classroomId:
          type: ["integer", "null"]
        grade:
          type: ["string", "null"]
        isActive:
          type: boolean

    UserInput:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        classroomId:
          type: integer
        grade:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        classroomId:
          type: integer

    Classroom:
      type: object
      required: [id, name, grade, teacherId]
      properties:
        id:
          type: integer
        name:
          type: string
        grade:
          type: string
        teacherId:
          type: ["integer", "null"]
        studentCount:
          type: integer

    TeacherDashboard:
      type: object
      required: [classrooms, riskSummary, recentResponses, followUpList, weeklyAlerts]
      properties:
        classrooms:
          type: array
          items:
            $ref: "#/components/schemas/Classroom"
        riskSummary:
          $ref: "#/components/schemas/RiskSummary"
        recentResponses:
          type: array
          items:
            $ref: "#/components/schemas/SurveyResponse"
        followUpList:
          type: array
          items:
            $ref: "#/components/schemas/Case"
        weeklyAlerts:
          type: integer
        bullyingIndex:
          type: number
        lonelinessIndex:
          type: number

    PsychologistDashboard:
      type: object
      required: [activeCases, riskSummary, recentActivity, pendingReferrals]
      properties:
        activeCases:
          type: array
          items:
            $ref: "#/components/schemas/Case"
        riskSummary:
          $ref: "#/components/schemas/RiskSummary"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/CaseNote"
        pendingReferrals:
          type: integer
        totalCases:
          type: integer
        closedThisMonth:
          type: integer

    AdminDashboard:
      type: object
      required: [userStats, surveyStats, riskSummary, schoolStats]
      properties:
        userStats:
          $ref: "#/components/schemas/UserStats"
        surveyStats:
          $ref: "#/components/schemas/SurveyStats"
        riskSummary:
          $ref: "#/components/schemas/RiskSummary"
        schoolStats:
          $ref: "#/components/schemas/SchoolStats"

    RiskSummary:
      type: object
      required: [green, yellow, orange, red, total]
      properties:
        green:
          type: integer
        yellow:
          type: integer
        orange:
          type: integer
        red:
          type: integer
        total:
          type: integer

    UserStats:
      type: object
      required: [total, students, teachers, psychologists, admins]
      properties:
        total:
          type: integer
        students:
          type: integer
        teachers:
          type: integer
        psychologists:
          type: integer
        admins:
          type: integer

    SurveyStats:
      type: object
      required: [total, active, completedThisMonth, avgRiskScore]
      properties:
        total:
          type: integer
        active:
          type: integer
        completedThisMonth:
          type: integer
        avgRiskScore:
          type: number

    SchoolStats:
      type: object
      required: [totalClassrooms, avgBullyingIndex, avgLonelinessIndex, participationRate]
      properties:
        totalClassrooms:
          type: integer
        avgBullyingIndex:
          type: number
        avgLonelinessIndex:
          type: number
        participationRate:
          type: number

    NotificationInput:
      type: object
      required: [to, subject, type]
      properties:
        to:
          type: string
        subject:
          type: string
        type:
          type: string
          description: "risk_alert, case_update, survey_reminder"
        studentCode:
          type: string
        riskLevel:
          type: string
        grade:
          type: string
        flags:
          type: array
          items:
            type: string

    NotificationResult:
      type: object
      required: [success, messageId]
      properties:
        success:
          type: boolean
        messageId:
          type: string
        sentAt:
          type: string
